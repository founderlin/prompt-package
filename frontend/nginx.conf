# Prompt Package — frontend nginx config.
#
# Role of this file inside the container:
#   1. Serve the Vite-built SPA (`dist/`) with a sensible cache policy.
#   2. Fall back to index.html so deep links like /projects/42/chat/7
#      survive a hard refresh (SPA routing).
#   3. Reverse-proxy /api/* to the backend container, so the browser
#      never sees the backend hostname directly. That means:
#        - CORS is irrelevant in this topology (same origin).
#        - The frontend bundle can be built with VITE_API_BASE_URL=""
#          and still hit the backend via relative /api/... paths.
#
# The upstream host ``backend`` resolves via the docker-compose service
# name; Docker's embedded DNS handles that on the default network.

upstream promptpackage_backend {
    server backend:5001;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't log the very chatty healthcheck polls — they'd drown out
    # actual traffic in `docker logs`.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- API reverse proxy --------------------------------------------
    # Everything under /api goes straight to the Flask backend. We give
    # the proxy a generous timeout because chat completions can run
    # ~60s on big prompts (gunicorn itself is configured for 120s).
    location /api/ {
        proxy_pass         http://promptpackage_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     130s;
        proxy_read_timeout     130s;

        # Streaming responses (future) shouldn't be buffered.
        proxy_buffering        off;
        proxy_request_buffering off;
    }

    # --- Static asset cache -------------------------------------------
    # Vite emits hashed filenames (app.<hash>.js). Those can safely live
    # in the browser cache forever; index.html must not.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback --------------------------------------------------
    # Any URL that doesn't match a real file falls back to index.html
    # so vue-router's history mode can pick it up client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Security hygiene — keep in sync with what the backend emits.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header Referrer-Policy         no-referrer-when-downgrade always;

    # Reasonable upload ceiling for attachments (PDF / MD / TXT / images).
    client_max_body_size 20m;
}
